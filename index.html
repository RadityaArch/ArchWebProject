<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glass Dashboard Collection</title>
  <style>
    :root {
      --bg: #f8fbff;
      --surface: #ffffff;
      --surface-strong: #f6f9ff;
      --text: #0f172a;
      --muted: #475569;
      --accent: #2563eb;
      --accent-soft: rgba(37, 99, 235, 0.12);
      --border: rgba(15, 23, 42, 0.08);
      --shadow: 0 20px 45px rgba(15, 23, 42, 0.10);
      --shadow-strong: 0 24px 60px rgba(15, 23, 42, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .dashboard {
      width: min(1180px, calc(100% - 32px));
      margin: 24px auto;
      padding: 24px;
    }

    .hero {
      padding: 32px;
      border-radius: 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 24px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      padding: 8px 16px;
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.08);
      border: 1px solid rgba(37, 99, 235, 0.16);
      color: #1c3aa9;
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.9rem, 3vw, 2.8rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      max-width: 720px;
      line-height: 1.75;
      font-size: 1rem;
    }

    .hero-actions {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: flex-end;
      min-width: 220px;
    }

    .hero-pill,
    .theme-toggle {
      padding: 14px 20px;
      border-radius: 999px;
      background: var(--surface-strong);
      border: 1px solid var(--border);
      font-weight: 700;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .hero-pill {
      color: var(--accent);
      background: rgba(37, 99, 235, 0.07);
      border-color: rgba(37, 99, 235, 0.16);
    }

    .theme-toggle {
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: var(--text);
      background: var(--surface-strong);
      border-color: var(--border);
      box-shadow: 0 16px 32px rgba(15, 23, 42, 0.08);
      min-width: 150px;
      justify-content: center;
    }

    .theme-toggle:hover {
      transform: translateY(-1px);
      box-shadow: 0 22px 34px rgba(15, 23, 42, 0.12);
    }

    .theme-toggle .toggle-icon {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(37, 99, 235, 0.12);
      color: var(--accent);
      font-size: 0.95rem;
    }

    .grid {
      margin-top: 24px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 18px;
    }

    .card-link {
      display: block;
      padding: 26px;
      min-height: 190px;
      border-radius: 24px;
      background: var(--surface);
      border: 1px solid rgba(15, 23, 42, 0.08);
      box-shadow: 0 20px 48px rgba(15, 23, 42, 0.08);
      color: var(--text);
      text-decoration: none;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.2s ease;
    }

    .card-link:hover {
      transform: translateY(-5px);
      box-shadow: 0 26px 58px rgba(15, 23, 42, 0.14);
      border-color: rgba(37, 99, 235, 0.18);
    }

    .card-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: rgba(37, 99, 235, 0.12);
      color: #1e40af;
      font-size: 1.2rem;
      margin-bottom: 16px;
    }

    .card-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 16px;
      background: var(--accent);
      color: #ffffff;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .card-link h3 {
      margin: 0 0 10px;
      font-size: 1.18rem;
      letter-spacing: -0.02em;
    }

    .card-link p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.75;
      font-size: 0.98rem;
    }

    .arrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: var(--accent);
    }

    .arrow::after {
      content: "→";
    }

    .tip-box {
      margin-top: 24px;
      padding: 20px 22px;
      border-radius: 22px;
      background: rgba(37, 99, 235, 0.05);
      border: 1px solid rgba(37, 99, 235, 0.12);
      color: var(--muted);
    }

    .tip-box strong {
      color: var(--text);
    }

    .copy-note {
      margin-top: 10px;
      font-size: 0.95rem;
      opacity: 0.92;
    }

    body.dark-mode {
      --bg: #05070f;
      --surface: #0b1221;
      --surface-strong: #0f172c;
      --text: #f8fbff;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-soft: rgba(56, 189, 248, 0.14);
      --border: rgba(56, 189, 248, 0.24);
      --shadow: 0 24px 65px rgba(0, 0, 0, 0.35);
      background: var(--bg);
    }

    body.dark-mode .hero,
    body.dark-mode .card-link,
    body.dark-mode .theme-toggle {
      background: var(--surface);
    }

    body.dark-mode .hero {
      border-color: var(--border);
      box-shadow: var(--shadow);
    }

    body.dark-mode .hero-pill {
      color: var(--accent);
      background: rgba(56, 189, 248, 0.1);
      border-color: rgba(56, 189, 248, 0.18);
    }

    body.dark-mode .theme-toggle {
      border-color: var(--border);
      box-shadow: 0 18px 32px rgba(0, 0, 0, 0.28);
      color: var(--text);
    }

    body.dark-mode .theme-toggle:hover {
      box-shadow: 0 22px 36px rgba(0, 0, 0, 0.36);
    }

    body.dark-mode .theme-toggle .toggle-icon {
      background: rgba(255, 255, 255, 0.08);
      color: var(--accent);
    }

    body.dark-mode .card-link {
      border-color: var(--border);
      box-shadow: 0 24px 55px rgba(0, 0, 0, 0.25);
      color: var(--text);
    }

    body.dark-mode .card-link:hover {
      box-shadow: 0 28px 72px rgba(0, 0, 0, 0.3);
      border-color: rgba(56, 189, 248, 0.28);
    }

    body.dark-mode .card-icon {
      background: rgba(56, 189, 248, 0.14);
      color: #dbeafe;
    }

    body.dark-mode .card-badge {
      background: var(--accent);
      color: #ffffff;
    }

    body.dark-mode .tip-box {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(56, 189, 248, 0.18);
      color: #cbd5e1;
    }

    body.dark-mode .tip-box strong {
      color: #f8fbff;
    }

    @media (max-width: 680px) {
      .hero {
        padding: 24px;
      }

      .hero-actions {
        width: 100%;
        justify-content: stretch;
      }

      .hero-pill,
      .theme-toggle {
        flex: 1 1 100%;
      }
    }
  </style>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const button = document.getElementById('themeToggle');
      const body = document.body;
      const stored = localStorage.getItem('siteTheme');

      const icon = button.querySelector('.toggle-icon');
      const label = button.querySelector('.toggle-label');

      if (stored === 'dark') {
        body.classList.add('dark-mode');
        icon.textContent = '🌙';
        label.textContent = 'Dark mode';
      } else {
        icon.textContent = '☀️';
        label.textContent = 'Light mode';
      }

      button.addEventListener('click', function () {
        const isDark = body.classList.toggle('dark-mode');
        icon.textContent = isDark ? '🌙' : '☀️';
        label.textContent = isDark ? 'Dark mode' : 'Light mode';
        localStorage.setItem('siteTheme', isDark ? 'dark' : 'light');
      });
    });
  </script>
</head>
<body>
  <main class="dashboard">
    <section class="hero">
      <div>
        <span class="eyebrow">PROJECT COLLECTION</span>
        <h1>Archietilla Project Collection</h1>
        <p>Bingo!</p>
      </div>
      <div class="hero-actions">
        <div class="hero-pill">SCHOOL PROJECT</div>
        <button class="theme-toggle" id="themeToggle" type="button"><span class="toggle-icon">☀️</span><span class="toggle-label">Light mode</span></button>
      </div>
    </section>

    <section class="grid">
      <a class="card-link" href="BakteriKelasX.html" target="_blank">
        <span class="card-icon">🧬</span>
        <span class="card-badge">01</span>
        <h3>Bakteri Kelas X</h3>
        <p>Biologi, rangkuman materi Bakteri.</p>
        <span class="arrow">Pelajari →</span>
      </a>
      <a class="card-link" href="EkologiKelasX.html" target="_blank">
        <span class="card-icon">🧬</span>
        <span class="card-badge">01</span>
        <h3>Ekologi Kelas X</h3>
        <p>Biologi, rangkuman materi Ekologi.</p>
        <span class="arrow">Pelajari →</span>
      </a>
    </section>

    <section class="tip-box">
      <strong>This is vibe coded.</strong>
      <div class="copy-note">Feel free to use it as learning materials.</div>
    </section>
  </main>
</body>
</html>
